<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Memory Viewer</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/d3@7"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f8fb; color: #111827; }
      .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      .metric { min-width: 180px; }
      button { border: 1px solid #d1d5db; background: #fff; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
      button.active { background: #111827; color: #fff; border-color: #111827; }
      input { border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 10px; min-width: 240px; }
      pre { background: #0b1020; color: #d1e4ff; border-radius: 8px; padding: 10px; overflow: auto; max-height: 320px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; vertical-align: top; }
      .muted { color: #6b7280; font-size: 13px; }
      .graph-box { width: 100%; height: 560px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
      .empty { background: #fffbeb; border: 1px solid #f59e0b; border-radius: 8px; padding: 12px; color: #78350f; margin-top: 12px; }
      code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; }
      .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .info-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; }
      .pager { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
      .tier-badge { font-size: 11px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; display: inline-block; letter-spacing: 0.02em; }
      .tier-core { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
      .tier-general { background: #e0e7ff; color: #3730a3; border: 1px solid #a5b4fc; }
      .tier-data { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
      .tier-storage { background: #f3e8ff; color: #6b21a8; border: 1px solid #d8b4fe; }
      textarea.add-box { min-width: 280px; min-height: 100px; width: 100%; max-width: 640px; font-family: inherit; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; }
      label.inline { display: inline-flex; align-items: center; gap: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      async function api(path) {
        const res = await fetch(path);
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: "Request failed" }));
          throw new Error(err.error || "Request failed");
        }
        return res.json();
      }

      async function apiPost(path, body) {
        const res = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: "Request failed" }));
          throw new Error(err.error || "Request failed");
        }
        return res.json();
      }

      function TierBadge({ tier }) {
        const t = (tier || "general").toLowerCase();
        const cls = ["tier-badge", `tier-${t}`].join(" ");
        return <span className={cls}>{t}</span>;
      }

      function pickNodeLabel(node) {
        const p = (node && node.properties) || {};
        const candidates = [p.name, p.label, p.title, p.value, p.entity, p.display_name];
        for (const c of candidates) {
          if (typeof c === "string" && c.trim()) return c.trim();
          if (Array.isArray(c) && c.length > 0) {
            const first = c.find((x) => typeof x === "string" && x.trim());
            if (first) return first.trim();
          }
          if (c && typeof c === "object") {
            const inner = c.name || c.label || c.value || c.text;
            if (typeof inner === "string" && inner.trim()) return inner.trim();
          }
        }
        const fallbackID = node?.id || "node";
        const shortID = fallbackID.length > 18 ? `${fallbackID.slice(0, 18)}...` : fallbackID;
        return node?.type ? `${node.type}: ${shortID}` : shortID;
      }

      function App() {
        const [tab, setTab] = useState("overview");
        const [overview, setOverview] = useState(null);
        const [datapoints, setDatapoints] = useState([]);
        const [inputs, setInputs] = useState([]);
        const [processed, setProcessed] = useState([]);
        const [relationships, setRelationships] = useState({ nodes: [], edges: [] });
        const [vectors, setVectors] = useState([]);
        const [dpKindFilter, setDpKindFilter] = useState("processed");
        const [dpStatusFilter, setDpStatusFilter] = useState("all");
        const [inputStatusFilter, setInputStatusFilter] = useState("all");
        const [processedStatusFilter, setProcessedStatusFilter] = useState("all");
        const [vecKindFilter, setVecKindFilter] = useState("processed");
        const [vecStatusFilter, setVecStatusFilter] = useState("completed");
        const [pageSize, setPageSize] = useState(10);
        const [datapointsTotal, setDatapointsTotal] = useState(0);
        const [inputsTotal, setInputsTotal] = useState(0);
        const [processedTotal, setProcessedTotal] = useState(0);
        const [vectorsTotal, setVectorsTotal] = useState(0);
        const [dpPage, setDpPage] = useState(1);
        const [inputsPage, setInputsPage] = useState(1);
        const [processedPage, setProcessedPage] = useState(1);
        const [vectorsPage, setVectorsPage] = useState(1);
        const [query, setQuery] = useState("");
        const [searchResult, setSearchResult] = useState(null);
        const [searchSession, setSearchSession] = useState("default");
        const [searchFourTier, setSearchFourTier] = useState(true);
        const [searchIncludeStorage, setSearchIncludeStorage] = useState(false);
        const [searchAutoStorage, setSearchAutoStorage] = useState(true);
        const [searchWeakTh, setSearchWeakTh] = useState("0.35");
        const [thinkText, setThinkText] = useState("");
        const [thinkSession, setThinkSession] = useState("default");
        const [thinkLimit, setThinkLimit] = useState("8");
        const [thinkHopDepth, setThinkHopDepth] = useState("2");
        const [thinkAnalyzeQuery, setThinkAnalyzeQuery] = useState(true);
        const [thinkEnableThinking, setThinkEnableThinking] = useState(false);
        const [thinkIncludeReasoning, setThinkIncludeReasoning] = useState(true);
        const [thinkLearnRel, setThinkLearnRel] = useState(false);
        const [thinkMaxSteps, setThinkMaxSteps] = useState("3");
        const [thinkMaxCtx, setThinkMaxCtx] = useState("0");
        const [thinkSegment, setThinkSegment] = useState(false);
        const [thinkFourTier, setThinkFourTier] = useState(true);
        const [thinkIncludeStorage, setThinkIncludeStorage] = useState(false);
        const [thinkAutoStorage, setThinkAutoStorage] = useState(true);
        const [thinkWeakTh, setThinkWeakTh] = useState("0.35");
        const [thinkResult, setThinkResult] = useState(null);
        const [thinkLoading, setThinkLoading] = useState(false);
        const [tierFilter, setTierFilter] = useState("all");
        const [addContent, setAddContent] = useState("");
        const [addSession, setAddSession] = useState("default");
        const [addTier, setAddTier] = useState("general");
        const [addCognify, setAddCognify] = useState(true);
        const [addMessage, setAddMessage] = useState("");
        const [addFileName, setAddFileName] = useState("");
        const addFileRef = useRef(null);
        const [graphStats, setGraphStats] = useState(null);
        const [graphNodeID, setGraphNodeID] = useState("");
        const [graphNeighbors, setGraphNeighbors] = useState(null);
        const [graphRenderMeta, setGraphRenderMeta] = useState({ renderedNodes: 0, renderedEdges: 0, groups: [] });
        const [selectedGraphItem, setSelectedGraphItem] = useState(null);
        const [error, setError] = useState("");
        const graphRef = useRef(null);

        const loadOverview = async () => setOverview(await api("/api/overview"));
        const tierQ = () => (tierFilter && tierFilter !== "all" ? `&tier=${encodeURIComponent(tierFilter)}` : "");
        const loadDataPoints = async () => {
          const offset = (dpPage - 1) * pageSize;
          const resp = await api(`/api/datapoints?limit=${pageSize}&offset=${offset}&kind=${encodeURIComponent(dpKindFilter)}&status=${encodeURIComponent(dpStatusFilter)}${tierQ()}`);
          setDatapoints(resp.items || []);
          setDatapointsTotal(resp.total || 0);
        };
        const loadInputs = async () => {
          const offset = (inputsPage - 1) * pageSize;
          const resp = await api(`/api/inputs?limit=${pageSize}&offset=${offset}&status=${encodeURIComponent(inputStatusFilter)}${tierQ()}`);
          setInputs(resp.items || []);
          setInputsTotal(resp.total || 0);
        };
        const loadProcessed = async () => {
          const offset = (processedPage - 1) * pageSize;
          const resp = await api(`/api/processed?limit=${pageSize}&offset=${offset}&status=${encodeURIComponent(processedStatusFilter)}${tierQ()}`);
          setProcessed(resp.items || []);
          setProcessedTotal(resp.total || 0);
        };
        const loadRelationships = async () => setRelationships(await api("/api/relationships?limit=200"));
        const loadVectors = async () => {
          const offset = (vectorsPage - 1) * pageSize;
          const resp = await api(`/api/vectors?limit=${pageSize}&offset=${offset}&kind=${encodeURIComponent(vecKindFilter)}&status=${encodeURIComponent(vecStatusFilter)}${tierQ()}`);
          setVectors(resp.items || []);
          setVectorsTotal(resp.total || 0);
        };
        const loadGraphStats = async () => setGraphStats(await api("/api/graph/stats"));
        const refreshAll = async () => {
          setError("");
          await Promise.all([loadOverview(), loadDataPoints(), loadInputs(), loadProcessed(), loadRelationships(), loadVectors(), loadGraphStats()]);
        };

        useEffect(() => {
          (async () => {
            try {
              await refreshAll();
            } catch (e) {
              setError(e.message);
            }
          })();
        }, []);

        useEffect(() => {
          setDpPage(1);
        }, [dpKindFilter, dpStatusFilter, pageSize, tierFilter]);
        useEffect(() => {
          loadDataPoints().catch((e) => setError(e.message));
        }, [dpKindFilter, dpStatusFilter, dpPage, pageSize]);

        useEffect(() => {
          setInputsPage(1);
        }, [inputStatusFilter, pageSize, tierFilter]);
        useEffect(() => {
          loadInputs().catch((e) => setError(e.message));
        }, [inputStatusFilter, inputsPage, pageSize]);

        useEffect(() => {
          setProcessedPage(1);
        }, [processedStatusFilter, pageSize, tierFilter]);
        useEffect(() => {
          loadProcessed().catch((e) => setError(e.message));
        }, [processedStatusFilter, processedPage, pageSize]);

        useEffect(() => {
          setVectorsPage(1);
        }, [vecKindFilter, vecStatusFilter, pageSize, tierFilter]);
        useEffect(() => {
          loadVectors().catch((e) => setError(e.message));
        }, [vecKindFilter, vecStatusFilter, vectorsPage, pageSize]);

        const topEdges = useMemo(() => (relationships.edges || []).slice(0, 40), [relationships]);

        useEffect(() => {
          if (tab !== "graph") return;
          if (!graphRef.current || !window.d3) return;

          const d3 = window.d3;
          const width = graphRef.current.clientWidth || 1000;
          const height = graphRef.current.clientHeight || 560;
          graphRef.current.innerHTML = "";

          const nodeMap = new Map();
          (relationships.nodes || []).forEach((n) => {
            nodeMap.set(n.id, {
              id: n.id,
              label: pickNodeLabel(n),
              group: n.type || "Node",
            });
          });
          (relationships.edges || []).forEach((e) => {
            if (!nodeMap.has(e.from)) nodeMap.set(e.from, { id: e.from, label: e.from, group: "Node" });
            if (!nodeMap.has(e.to)) nodeMap.set(e.to, { id: e.to, label: e.to, group: "Node" });
          });

          const nodes = Array.from(nodeMap.values()).slice(0, 220);
          const allow = new Set(nodes.map((n) => n.id));
          const links = (relationships.edges || [])
            .filter((e) => allow.has(e.from) && allow.has(e.to))
            .slice(0, 320)
            .map((e) => ({ source: e.from, target: e.to, type: e.type || "REL", raw: e }));

          const groups = Array.from(new Set(nodes.map((n) => n.group))).sort();
          setGraphRenderMeta({ renderedNodes: nodes.length, renderedEdges: links.length, groups });

          const svg = d3.select(graphRef.current).append("svg").attr("width", width).attr("height", height);
          const root = svg.append("g");
          svg.call(d3.zoom().scaleExtent([0.4, 4]).on("zoom", (ev) => root.attr("transform", ev.transform)));

          const color = d3.scaleOrdinal(d3.schemeCategory10);
          const sim = d3
            .forceSimulation(nodes)
            .force("link", d3.forceLink(links).id((d) => d.id).distance(70))
            .force("charge", d3.forceManyBody().strength(-180))
            .force("center", d3.forceCenter(width / 2, height / 2));

          const link = root
            .append("g")
            .selectAll("line")
            .data(links)
            .enter()
            .append("line")
            .attr("stroke", "#94a3b8")
            .attr("stroke-opacity", 0.7)
            .attr("stroke-width", 1.2)
            .on("click", (_, d) => {
              const sourceID = typeof d.source === "string" ? d.source : d.source.id;
              const targetID = typeof d.target === "string" ? d.target : d.target.id;
              setSelectedGraphItem({
                kind: "edge",
                id: d.raw?.id || `${sourceID}->${targetID}`,
                source: sourceID,
                target: targetID,
                type: d.type,
                weight: d.raw?.weight ?? null,
              });
            });

          const edgeLabel = root
            .append("g")
            .selectAll("text")
            .data(links)
            .enter()
            .append("text")
            .attr("font-size", 10)
            .attr("fill", "#64748b")
            .attr("pointer-events", "none")
            .text((d) => d.type || "");

          const node = root
            .append("g")
            .selectAll("circle")
            .data(nodes)
            .enter()
            .append("circle")
            .attr("r", 6)
            .attr("fill", (d) => color(d.group))
            .on("click", (_, d) => {
              setSelectedGraphItem({
                kind: "node",
                id: d.id,
                label: d.label,
                group: d.group,
              });
            })
            .call(
              d3
                .drag()
                .on("start", (ev, d) => {
                  if (!ev.active) sim.alphaTarget(0.3).restart();
                  d.fx = d.x;
                  d.fy = d.y;
                })
                .on("drag", (ev, d) => {
                  d.fx = ev.x;
                  d.fy = ev.y;
                })
                .on("end", (ev, d) => {
                  if (!ev.active) sim.alphaTarget(0);
                  d.fx = null;
                  d.fy = null;
                })
            );

          node.append("title").text((d) => d.label);

          const nodeLabel = root
            .append("g")
            .selectAll("text")
            .data(nodes)
            .enter()
            .append("text")
            .attr("font-size", 11)
            .attr("fill", "#334155")
            .attr("dx", 8)
            .attr("dy", 3)
            .attr("pointer-events", "none")
            .text((d) => (d.label || "").slice(0, 26));

          sim.on("tick", () => {
            link
              .attr("x1", (d) => d.source.x)
              .attr("y1", (d) => d.source.y)
              .attr("x2", (d) => d.target.x)
              .attr("y2", (d) => d.target.y);
            node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
            nodeLabel.attr("x", (d) => d.x).attr("y", (d) => d.y);
            edgeLabel
              .attr("x", (d) => (d.source.x + d.target.x) / 2)
              .attr("y", (d) => (d.source.y + d.target.y) / 2);
          });

          return () => sim.stop();
        }, [tab, relationships]);

        async function loadNeighbors() {
          if (!graphNodeID.trim()) return;
          try {
            setError("");
            setGraphNeighbors(await api(`/api/graph/neighbors?node_id=${encodeURIComponent(graphNodeID)}&depth=2`));
          } catch (e) {
            setError(e.message);
          }
        }

        async function runSearch() {
          if (!query.trim()) return;
          try {
            setError("");
            let url = `/api/search?q=${encodeURIComponent(query)}&limit=8&session=${encodeURIComponent((searchSession || "default").trim() || "default")}`;
            if (searchFourTier) {
              url += "&four_tier=true";
              if (searchIncludeStorage) url += "&include_storage=true";
              if (searchAutoStorage) url += "&auto_storage=true";
              const w = parseFloat(searchWeakTh, 10);
              if (!Number.isNaN(w) && w > 0) url += `&weak_threshold=${encodeURIComponent(String(w))}`;
            }
            setSearchResult(await api(url));
          } catch (e) {
            setError(e.message);
          }
        }

        async function runThink() {
          if (!thinkText.trim()) {
            setError("Nhập câu hỏi cho Think.");
            return;
          }
          setThinkLoading(true);
          setError("");
          try {
            const lim = parseInt(thinkLimit, 10);
            const hop = parseInt(thinkHopDepth, 10);
            const maxSteps = parseInt(thinkMaxSteps, 10);
            const maxCtx = parseInt(thinkMaxCtx, 10);
            const body = {
              text: thinkText.trim(),
              session_id: (thinkSession || "default").trim() || "default",
              limit: Number.isFinite(lim) && lim > 0 ? lim : 8,
              hop_depth: Number.isFinite(hop) && hop > 0 ? hop : 2,
              analyze_query: thinkAnalyzeQuery,
              enable_thinking: thinkEnableThinking,
              include_reasoning: thinkIncludeReasoning,
              learn_relationships: thinkLearnRel,
              max_thinking_steps: Number.isFinite(maxSteps) && maxSteps > 0 ? maxSteps : 3,
              max_context_length: Number.isFinite(maxCtx) && maxCtx > 0 ? maxCtx : 0,
              segment_context: thinkSegment,
            };
            if (thinkFourTier) {
              const en = true;
              const w = parseFloat(thinkWeakTh, 10);
              body.four_tier = {
                enabled: en,
                include_storage_tier: thinkIncludeStorage,
                auto_storage_if_weak: thinkAutoStorage,
                weak_score_threshold: !Number.isNaN(w) && w > 0 ? w : 0.35,
              };
            }
            setThinkResult(await apiPost("/api/think", body));
          } catch (e) {
            setError(e.message);
            setThinkResult(null);
          } finally {
            setThinkLoading(false);
          }
        }

        function onAddFileChange(ev) {
          const f = ev.target?.files?.[0];
          if (!f) return;
          setAddFileName(f.name);
          const reader = new FileReader();
          reader.onload = () => {
            setAddContent(String(reader.result ?? ""));
            setAddMessage(`Đã nạp file: ${f.name} (${(f.size / 1024).toFixed(1)} KB)`);
          };
          reader.onerror = () => {
            setError("Không đọc được file.");
            setAddFileName("");
          };
          reader.readAsText(f, "UTF-8");
          ev.target.value = "";
        }

        async function submitAddMemory() {
          if (!addContent.trim()) {
            setAddMessage("Nhập nội dung hoặc chọn file.");
            return;
          }
          try {
            setError("");
            setAddMessage("");
            const r = await apiPost("/api/memory", {
              content: addContent,
              session_id: (addSession || "default").trim() || "default",
              tier: addTier,
              cognify: addCognify,
            });
            setAddMessage(`Đã thêm: ${r.id} (tier: ${r.memory_tier})${r.cognify_queued ? " — cognify đã xếp hàng." : ""}`);
            setAddContent("");
            setAddFileName("");
            if (addFileRef.current) addFileRef.current.value = "";
            await refreshAll();
          } catch (e) {
            setError(e.message);
          }
        }

        return (
          <div className="wrap">
            <h1>AI Memory Viewer</h1>
            <p className="muted">Preview datapoints, vectors, graph relationships, and run search directly from browser.</p>
            {error ? <div className="card" style={{ borderColor: "#ef4444" }}>{error}</div> : null}

            <div className="row" style={{ marginBottom: "16px" }}>
              {["overview", "add", "inputs", "processed", "datapoints", "vectors", "relationships", "graph", "search", "think"].map((name) => (
                <button key={name} className={tab === name ? "active" : ""} onClick={() => setTab(name)}>
                  {name}
                </button>
              ))}
              <button onClick={() => refreshAll().catch((e) => setError(e.message))}>Làm mới dữ liệu</button>
            </div>

            {tab === "add" && (
              <div className="card">
                <h3 style={{ marginTop: 0 }}>Thêm bộ nhớ (chọn tier)</h3>
                <p className="muted">
                  Gửi lên <code>POST /api/memory</code> — có thể gõ trực tiếp hoặc <strong>chọn file</strong> (đọc UTF-8: .txt, .md, .json, mã nguồn…). File nhị phân/PDF cần xử lý ngoài rồi dán nội dung.
                </p>
                <div className="row" style={{ flexDirection: "column", alignItems: "stretch" }}>
                  <label>
                    Session{" "}
                    <input value={addSession} onChange={(e) => setAddSession(e.target.value)} placeholder="default" style={{ minWidth: "200px" }} />
                  </label>
                  <label>
                    Tier{" "}
                    <select value={addTier} onChange={(e) => setAddTier(e.target.value)}>
                      <option value="general">general</option>
                      <option value="core">core</option>
                      <option value="data">data</option>
                      <option value="storage">storage</option>
                    </select>
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={addCognify} onChange={(e) => setAddCognify(e.target.checked)} />
                    Cognify bất đồng bộ sau khi add
                  </label>
                  <div className="row" style={{ alignItems: "center", marginTop: "4px" }}>
                    <label className="inline" style={{ cursor: "pointer" }}>
                      <span style={{ fontWeight: 600 }}>Nạp từ file</span>
                      <input
                        ref={addFileRef}
                        type="file"
                        onChange={onAddFileChange}
                        style={{ maxWidth: "min(100%, 360px)" }}
                      />
                    </label>
                    {addFileName ? <span className="muted">Đã chọn (trong ô dưới): {addFileName}</span> : null}
                  </div>
                  <textarea
                    className="add-box"
                    value={addContent}
                    onChange={(e) => setAddContent(e.target.value)}
                    placeholder="Nội dung cần lưu — hoặc chọn file phía trên để điền vào đây..."
                  />
                  <div className="row">
                    <button onClick={() => submitAddMemory()}>Thêm</button>
                  </div>
                  {addMessage ? <div className="muted" style={{ marginTop: "8px" }}>{addMessage}</div> : null}
                </div>
              </div>
            )}

            {tab === "inputs" && (
              <div className="card">
                <div className="row" style={{ marginBottom: "10px" }}>
                  <label>
                    Tier{" "}
                    <select value={tierFilter} onChange={(e) => setTierFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="core">core</option>
                      <option value="general">general</option>
                      <option value="data">data</option>
                      <option value="storage">storage</option>
                    </select>
                  </label>
                  <label>
                    Items/page{" "}
                    <select value={pageSize} onChange={(e) => setPageSize(Number(e.target.value) || 10)}>
                      <option value="10">10</option>
                      <option value="20">20</option>
                      <option value="50">50</option>
                    </select>
                  </label>
                  <label>
                    Status{" "}
                    <select value={inputStatusFilter} onChange={(e) => setInputStatusFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="pending">pending</option>
                      <option value="processing">processing</option>
                      <option value="cognified">cognified</option>
                      <option value="completed">completed</option>
                      <option value="failed">failed</option>
                    </select>
                  </label>
                  <button onClick={loadInputs}>Reload</button>
                </div>
                {inputs.length === 0 ? <div className="empty">Không có input records với filter status: <code>{inputStatusFilter}</code>.</div> : null}
                <table>
                  <thead>
                    <tr><th>ID</th><th>Tier</th><th>Content</th><th>Status</th><th>Progress</th></tr>
                  </thead>
                  <tbody>
                    {inputs.map((d) => (
                      <tr key={d.id}>
                        <td>{d.id}</td>
                        <td><TierBadge tier={d.memory_tier} /></td>
                        <td>{d.content?.slice(0, 140)}</td>
                        <td>{d.status}</td>
                        <td>{d.processed_chunks || 0}/{d.total_chunks || 0}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="pager">
                  <button disabled={inputsPage <= 1} onClick={() => setInputsPage((p) => Math.max(1, p - 1))}>Prev</button>
                  <span className="muted">Page {inputsPage} / {Math.max(1, Math.ceil(inputsTotal / pageSize))} ({inputsTotal} items)</span>
                  <button
                    disabled={inputsPage >= Math.max(1, Math.ceil(inputsTotal / pageSize))}
                    onClick={() => setInputsPage((p) => p + 1)}
                  >
                    Next
                  </button>
                </div>
              </div>
            )}

            {tab === "processed" && (
              <div className="card">
                <div className="row" style={{ marginBottom: "10px" }}>
                  <label>
                    Tier{" "}
                    <select value={tierFilter} onChange={(e) => setTierFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="core">core</option>
                      <option value="general">general</option>
                      <option value="data">data</option>
                      <option value="storage">storage</option>
                    </select>
                  </label>
                  <label>
                    Items/page{" "}
                    <select value={pageSize} onChange={(e) => setPageSize(Number(e.target.value) || 10)}>
                      <option value="10">10</option>
                      <option value="20">20</option>
                      <option value="50">50</option>
                    </select>
                  </label>
                  <label>
                    Status{" "}
                    <select value={processedStatusFilter} onChange={(e) => setProcessedStatusFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="pending">pending</option>
                      <option value="processing">processing</option>
                      <option value="cognified">cognified</option>
                      <option value="completed">completed</option>
                      <option value="failed">failed</option>
                    </select>
                  </label>
                  <button onClick={loadProcessed}>Reload</button>
                </div>
                {processed.length === 0 ? <div className="empty">Không có processed datapoints với filter status: <code>{processedStatusFilter}</code>. Thử để <code>all</code>.</div> : null}
                <table>
                  <thead>
                    <tr><th>ID</th><th>Tier</th><th>Parent</th><th>Chunk</th><th>Status</th><th>Content</th></tr>
                  </thead>
                  <tbody>
                    {processed.map((d) => (
                      <tr key={d.id}>
                        <td>{d.id}</td>
                        <td><TierBadge tier={d.memory_tier} /></td>
                        <td>{d.parent_id || "-"}</td>
                        <td>{Number.isInteger(d.chunk_index) ? `${d.chunk_index + 1}/${d.total_chunks || "?"}` : "-"}</td>
                        <td>{d.status}</td>
                        <td>{d.content?.slice(0, 120)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="pager">
                  <button disabled={processedPage <= 1} onClick={() => setProcessedPage((p) => Math.max(1, p - 1))}>Prev</button>
                  <span className="muted">Page {processedPage} / {Math.max(1, Math.ceil(processedTotal / pageSize))} ({processedTotal} items)</span>
                  <button
                    disabled={processedPage >= Math.max(1, Math.ceil(processedTotal / pageSize))}
                    onClick={() => setProcessedPage((p) => p + 1)}
                  >
                    Next
                  </button>
                </div>
              </div>
            )}

            {tab === "overview" && overview && (
              <div className="card">
                <div className="row">
                  <div className="metric"><strong>Total Records</strong><div>{overview.datapoint_count}</div></div>
                  <div className="metric"><strong>Processed DataPoints</strong><div>{overview.type_summary?.chunk ?? 0}</div></div>
                  <div className="metric"><strong>Sessions</strong><div>{overview.session_count}</div></div>
                  <div className="metric"><strong>Vectors</strong><div>{overview.vector_count}</div></div>
                </div>
                <div className="row" style={{ marginTop: "10px" }}>
                  <div className="metric"><strong>Input</strong><div>{overview.type_summary?.input ?? 0}</div></div>
                  <div className="metric"><strong>Chunk</strong><div>{overview.type_summary?.chunk ?? 0}</div></div>
                  <div className="metric"><strong>Pending</strong><div>{overview.status_summary?.pending ?? 0}</div></div>
                  <div className="metric"><strong>Processing</strong><div>{overview.status_summary?.processing ?? 0}</div></div>
                  <div className="metric"><strong>Completed</strong><div>{overview.status_summary?.completed ?? 0}</div></div>
                </div>
                <h3 style={{ marginTop: "14px" }}>Theo memory tier</h3>
                <div className="row" style={{ marginTop: "6px", alignItems: "center" }}>
                  <div className="metric"><strong>Core</strong><div>{overview.tier_summary?.core ?? 0}</div></div>
                  <div className="metric"><strong>General</strong><div>{overview.tier_summary?.general ?? 0}</div></div>
                  <div className="metric"><strong>Data</strong><div>{overview.tier_summary?.data ?? 0}</div></div>
                  <div className="metric"><strong>Storage</strong><div>{overview.tier_summary?.storage ?? 0}</div></div>
                </div>
                <h3>Latest</h3>
                <pre>{JSON.stringify(overview.latest, null, 2)}</pre>
                {overview.datapoint_count === 0 && (
                  <div className="empty">
                    <strong>Database đang trống.</strong>
                    <div style={{ marginTop: "8px" }}>
                      Bạn cần nạp dữ liệu trước khi preview:
                    </div>
                    <div style={{ marginTop: "6px" }}>
                      1) <code>ai-memory-cli add "Nội dung cần lưu"</code>
                    </div>
                    <div>
                      2) <code>ai-memory-cli cognify --session default</code>
                    </div>
                    <div>
                      3) Reload lại trang viewer.
                    </div>
                  </div>
                )}
              </div>
            )}

            {tab === "datapoints" && (
              <div className="card">
                <div className="row" style={{ marginBottom: "10px" }}>
                  <label>
                    Tier{" "}
                    <select value={tierFilter} onChange={(e) => setTierFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="core">core</option>
                      <option value="general">general</option>
                      <option value="data">data</option>
                      <option value="storage">storage</option>
                    </select>
                  </label>
                  <label>
                    Items/page{" "}
                    <select value={pageSize} onChange={(e) => setPageSize(Number(e.target.value) || 10)}>
                      <option value="10">10</option>
                      <option value="20">20</option>
                      <option value="50">50</option>
                    </select>
                  </label>
                  <label>
                    Kind{" "}
                    <select value={dpKindFilter} onChange={(e) => setDpKindFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="input">input</option>
                      <option value="chunk">chunk</option>
                      <option value="processed">processed</option>
                    </select>
                  </label>
                  <label>
                    Status{" "}
                    <select value={dpStatusFilter} onChange={(e) => setDpStatusFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="pending">pending</option>
                      <option value="processing">processing</option>
                      <option value="cognified">cognified</option>
                      <option value="completed">completed</option>
                      <option value="failed">failed</option>
                    </select>
                  </label>
                  <button onClick={loadDataPoints}>Reload</button>
                </div>
                {datapoints.length === 0 ? (
                  <div className="empty">Chưa có processed datapoint nào. Hãy chạy <code>cognify</code> sau khi <code>add</code>.</div>
                ) : null}
                <table>
                  <thead>
                    <tr><th>ID</th><th>Tier</th><th>Content</th><th>Status</th><th>Nodes</th><th>Edges</th></tr>
                  </thead>
                  <tbody>
                    {datapoints.map((d) => (
                      <tr key={d.id}>
                        <td>
                          <div><strong>{d.id}</strong></div>
                          <div className="muted">kind: {d.item_type || "input"}</div>
                          {d.parent_id ? <div className="muted">parent: {d.parent_id}</div> : null}
                          {Number.isInteger(d.chunk_index) ? (
                            <div className="muted">chunk: #{d.chunk_index + 1}/{d.total_chunks || "?"}</div>
                          ) : null}
                        </td>
                        <td><TierBadge tier={d.memory_tier} /></td>
                        <td>{d.content?.slice(0, 120)}</td>
                        <td>
                          <div>{d.status}</div>
                          {d.item_type === "input" && d.total_chunks ? (
                            <div className="muted">progress: {d.processed_chunks || 0}/{d.total_chunks}</div>
                          ) : null}
                        </td>
                        <td>{d.node_count}</td>
                        <td>{d.edge_count}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="pager">
                  <button disabled={dpPage <= 1} onClick={() => setDpPage((p) => Math.max(1, p - 1))}>Prev</button>
                  <span className="muted">Page {dpPage} / {Math.max(1, Math.ceil(datapointsTotal / pageSize))} ({datapointsTotal} items)</span>
                  <button
                    disabled={dpPage >= Math.max(1, Math.ceil(datapointsTotal / pageSize))}
                    onClick={() => setDpPage((p) => p + 1)}
                  >
                    Next
                  </button>
                </div>
              </div>
            )}

            {tab === "vectors" && (
              <div className="card">
                <div className="row" style={{ marginBottom: "10px" }}>
                  <label>
                    Tier{" "}
                    <select value={tierFilter} onChange={(e) => setTierFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="core">core</option>
                      <option value="general">general</option>
                      <option value="data">data</option>
                      <option value="storage">storage</option>
                    </select>
                  </label>
                  <label>
                    Items/page{" "}
                    <select value={pageSize} onChange={(e) => setPageSize(Number(e.target.value) || 10)}>
                      <option value="10">10</option>
                      <option value="20">20</option>
                      <option value="50">50</option>
                    </select>
                  </label>
                  <label>
                    Kind{" "}
                    <select value={vecKindFilter} onChange={(e) => setVecKindFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="input">input</option>
                      <option value="chunk">chunk</option>
                      <option value="processed">processed</option>
                    </select>
                  </label>
                  <label>
                    Status{" "}
                    <select value={vecStatusFilter} onChange={(e) => setVecStatusFilter(e.target.value)}>
                      <option value="all">all</option>
                      <option value="pending">pending</option>
                      <option value="processing">processing</option>
                      <option value="cognified">cognified</option>
                      <option value="completed">completed</option>
                      <option value="failed">failed</option>
                    </select>
                  </label>
                  <button onClick={loadVectors}>Reload</button>
                </div>
                {vectors.length === 0 ? (
                  <div className="empty">Chưa có vector embedding. Hãy chạy <code>cognify</code> sau khi <code>add</code>.</div>
                ) : null}
                {vectors.length > 0 ? (
                  <table style={{ marginBottom: "12px" }}>
                    <thead>
                      <tr><th>ID</th><th>Tier (DP)</th><th>Tier (vector)</th><th>Content</th></tr>
                    </thead>
                    <tbody>
                      {vectors.map((v) => (
                        <tr key={v.id}>
                          <td>{v.id}</td>
                          <td><TierBadge tier={v.memory_tier} /></td>
                          <td><TierBadge tier={v.vec_tier || v.memory_tier} /></td>
                          <td>{v.content?.slice(0, 100)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                ) : null}
                <p className="muted">Chi tiết embedding (preview)</p>
                <pre style={{ maxHeight: "240px" }}>{JSON.stringify(vectors, null, 2)}</pre>
                <div className="pager">
                  <button disabled={vectorsPage <= 1} onClick={() => setVectorsPage((p) => Math.max(1, p - 1))}>Prev</button>
                  <span className="muted">Page {vectorsPage} / {Math.max(1, Math.ceil(vectorsTotal / pageSize))} ({vectorsTotal} items)</span>
                  <button
                    disabled={vectorsPage >= Math.max(1, Math.ceil(vectorsTotal / pageSize))}
                    onClick={() => setVectorsPage((p) => p + 1)}
                  >
                    Next
                  </button>
                </div>
              </div>
            )}

            {tab === "relationships" && (
              <div className="card">
                <p><strong>Nodes:</strong> {relationships.nodes?.length || 0} | <strong>Edges:</strong> {relationships.edges?.length || 0}</p>
                {(relationships.nodes?.length || 0) === 0 && (relationships.edges?.length || 0) === 0 ? (
                  <div className="empty">Chưa có relationship graph. Hãy chạy <code>cognify</code> để trích xuất node/edge.</div>
                ) : null}
                {(relationships.nodes?.length || 0) > 0 && (
                  <>
                    <h4>Node List</h4>
                    <table>
                      <thead>
                        <tr><th>ID</th><th>Type</th><th>Name</th></tr>
                      </thead>
                      <tbody>
                        {(relationships.nodes || []).slice(0, 50).map((n) => (
                          <tr key={n.id}>
                            <td>{n.id}</td>
                            <td>{n.type || "-"}</td>
                            <td>{pickNodeLabel(n)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </>
                )}
                {(relationships.edges?.length || 0) > 0 && (
                  <>
                    <h4 style={{ marginTop: "12px" }}>Edge List</h4>
                    <table>
                      <thead>
                        <tr><th>ID</th><th>From</th><th>To</th><th>Type</th><th>Weight</th></tr>
                      </thead>
                      <tbody>
                        {(relationships.edges || []).slice(0, 80).map((e, idx) => (
                          <tr key={e.id || `${e.from}-${e.to}-${idx}`}>
                            <td>{e.id || "-"}</td>
                            <td>{e.from || "-"}</td>
                            <td>{e.to || "-"}</td>
                            <td>{e.type || "-"}</td>
                            <td>{e.weight ?? "-"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </>
                )}
                <h4 style={{ marginTop: "12px" }}>Raw Edges Preview</h4>
                <pre>{JSON.stringify(topEdges, null, 2)}</pre>
              </div>
            )}

            {tab === "graph" && (
              <>
                <div className="card">
                  <p><strong>Graph stats</strong></p>
                  <pre>{JSON.stringify(graphStats, null, 2)}</pre>
                </div>
                <div className="card">
                  <p><strong>Relationship graph preview</strong> (zoom + drag)</p>
                  <div ref={graphRef} className="graph-box"></div>
                  <div className="info-grid" style={{ marginTop: "12px" }}>
                    <div className="info-card">
                      <strong>Render info</strong>
                      <div className="muted">Node hiển thị: {graphRenderMeta.renderedNodes}</div>
                      <div className="muted">Edge hiển thị: {graphRenderMeta.renderedEdges}</div>
                      <div className="muted">Groups: {(graphRenderMeta.groups || []).join(", ") || "N/A"}</div>
                    </div>
                    <div className="info-card">
                      <strong>Selected item</strong>
                      {selectedGraphItem ? (
                        <pre style={{ marginTop: "8px" }}>{JSON.stringify(selectedGraphItem, null, 2)}</pre>
                      ) : (
                        <div className="muted" style={{ marginTop: "8px" }}>
                          Click vào node hoặc edge để xem chi tiết.
                        </div>
                      )}
                    </div>
                  </div>
                </div>
                <div className="card">
                  <div className="row">
                    <input value={graphNodeID} onChange={(e) => setGraphNodeID(e.target.value)} placeholder="node_id to inspect neighbors" />
                    <button onClick={loadNeighbors}>Load neighbors</button>
                  </div>
                  <pre>{JSON.stringify(graphNeighbors, null, 2)}</pre>
                </div>
              </>
            )}

            {tab === "search" && (
              <div className="card">
                <h3 style={{ marginTop: 0 }}>Tìm kiếm (four-tier)</h3>
                <div className="row" style={{ marginBottom: "10px" }}>
                  <label>
                    Session{" "}
                    <input value={searchSession} onChange={(e) => setSearchSession(e.target.value)} placeholder="default" style={{ minWidth: "160px" }} />
                  </label>
                </div>
                <div className="row" style={{ marginBottom: "10px", alignItems: "center" }}>
                  <label className="inline">
                    <input type="checkbox" checked={searchFourTier} onChange={(e) => setSearchFourTier(e.target.checked)} />
                    Bật pipeline 4 tầng (four_tier)
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={searchIncludeStorage} onChange={(e) => setSearchIncludeStorage(e.target.checked)} disabled={!searchFourTier} />
                    include_storage (song song)
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={searchAutoStorage} onChange={(e) => setSearchAutoStorage(e.target.checked)} disabled={!searchFourTier} />
                    auto_storage (lazy nếu điểm yếu)
                  </label>
                  <label>
                    weak_threshold{" "}
                    <input value={searchWeakTh} onChange={(e) => setSearchWeakTh(e.target.value)} disabled={!searchFourTier} style={{ minWidth: "72px" }} />
                  </label>
                </div>
                <div className="row">
                  <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Câu truy vấn..." style={{ flex: "1", minWidth: "200px" }} />
                  <button onClick={runSearch}>Search</button>
                </div>
                <p className="muted" style={{ marginTop: "10px" }}>
                  Kết quả gồm <code>four_tier_stats</code> khi bật 4 tầng; <code>parsed_context</code> có tiêu đề merged tier.
                </p>
                <pre>{JSON.stringify(searchResult, null, 2)}</pre>
              </div>
            )}

            {tab === "think" && (
              <div className="card">
                <h3 style={{ marginTop: 0 }}>Think</h3>
                <p className="muted">
                  Truy hồi bộ nhớ (giống Search) rồi gọi LLM trả lời có luận cứ — <code>POST /api/think</code>. Cần LLM (vd. LM Studio) trong config CLI.
                </p>
                <div className="row" style={{ marginBottom: "10px" }}>
                  <label>
                    Session{" "}
                    <input value={thinkSession} onChange={(e) => setThinkSession(e.target.value)} placeholder="default" style={{ minWidth: "160px" }} />
                  </label>
                  <label>
                    Limit{" "}
                    <input value={thinkLimit} onChange={(e) => setThinkLimit(e.target.value)} style={{ width: "56px" }} />
                  </label>
                  <label>
                    Hop depth{" "}
                    <input value={thinkHopDepth} onChange={(e) => setThinkHopDepth(e.target.value)} style={{ width: "56px" }} />
                  </label>
                </div>
                <div className="row" style={{ marginBottom: "10px", alignItems: "center" }}>
                  <label className="inline">
                    <input type="checkbox" checked={thinkAnalyzeQuery} onChange={(e) => setThinkAnalyzeQuery(e.target.checked)} />
                    analyze_query (tiền phân tích LLM)
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={thinkEnableThinking} onChange={(e) => setThinkEnableThinking(e.target.checked)} />
                    enable_thinking (vòng lặp agentic)
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={thinkIncludeReasoning} onChange={(e) => setThinkIncludeReasoning(e.target.checked)} />
                    include_reasoning (JSON có reasoning)
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={thinkLearnRel} onChange={(e) => setThinkLearnRel(e.target.checked)} />
                    learn_relationships
                  </label>
                </div>
                <div className="row" style={{ marginBottom: "10px", alignItems: "center" }}>
                  <label>
                    max_thinking_steps{" "}
                    <input value={thinkMaxSteps} onChange={(e) => setThinkMaxSteps(e.target.value)} style={{ width: "48px" }} disabled={!thinkEnableThinking} />
                  </label>
                  <label>
                    max_context_length{" "}
                    <input value={thinkMaxCtx} onChange={(e) => setThinkMaxCtx(e.target.value)} style={{ width: "64px" }} />
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={thinkSegment} onChange={(e) => setThinkSegment(e.target.checked)} />
                    segment_context
                  </label>
                </div>
                <div className="row" style={{ marginBottom: "10px", alignItems: "center" }}>
                  <label className="inline">
                    <input type="checkbox" checked={thinkFourTier} onChange={(e) => setThinkFourTier(e.target.checked)} />
                    four_tier (truy hồi 4 tầng)
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={thinkIncludeStorage} onChange={(e) => setThinkIncludeStorage(e.target.checked)} disabled={!thinkFourTier} />
                    include_storage_tier
                  </label>
                  <label className="inline">
                    <input type="checkbox" checked={thinkAutoStorage} onChange={(e) => setThinkAutoStorage(e.target.checked)} disabled={!thinkFourTier} />
                    auto_storage_if_weak
                  </label>
                  <label>
                    weak_threshold{" "}
                    <input value={thinkWeakTh} onChange={(e) => setThinkWeakTh(e.target.value)} disabled={!thinkFourTier} style={{ minWidth: "56px" }} />
                  </label>
                </div>
                <textarea
                  className="add-box"
                  value={thinkText}
                  onChange={(e) => setThinkText(e.target.value)}
                  placeholder="Câu hỏi / yêu cầu suy luận trên bộ nhớ..."
                />
                <div className="row" style={{ marginTop: "10px" }}>
                  <button onClick={() => runThink()} disabled={thinkLoading}>
                    {thinkLoading ? "Đang Think…" : "Chạy Think"}
                  </button>
                </div>
                {thinkResult ? (
                  <div style={{ marginTop: "16px" }}>
                    {thinkResult.answer ? (
                      <div className="card" style={{ background: "#f0fdf4", borderColor: "#86efac" }}>
                        <strong>Answer</strong>
                        <p style={{ margin: "8px 0 0", whiteSpace: "pre-wrap" }}>{thinkResult.answer}</p>
                      </div>
                    ) : null}
                    {thinkResult.reasoning ? (
                      <div className="card" style={{ marginTop: "10px", background: "#f8fafc", borderColor: "#e2e8f0" }}>
                        <strong>Reasoning</strong>
                        <p style={{ margin: "8px 0 0", whiteSpace: "pre-wrap" }}>{thinkResult.reasoning}</p>
                      </div>
                    ) : null}
                    {thinkResult.analysis ? (
                      <div className="muted" style={{ marginTop: "10px" }}>
                        <strong>Analysis</strong>
                        <pre style={{ marginTop: "6px", maxHeight: "160px" }}>{JSON.stringify(thinkResult.analysis, null, 2)}</pre>
                      </div>
                    ) : null}
                    <p className="muted" style={{ marginTop: "12px" }}>Đầy đủ JSON</p>
                    <pre style={{ maxHeight: "360px" }}>{JSON.stringify(thinkResult, null, 2)}</pre>
                  </div>
                ) : null}
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
